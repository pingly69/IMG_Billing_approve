<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบอนุมัติรายการ - LIFF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <div id="loading" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-gray-500 animate-pulse">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- 0. Registration Screen -->
    <div id="reg-screen" class="hidden p-6">
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 mt-10 border border-gray-100">
            <h2 class="text-2xl font-bold text-center mb-2 text-indigo-700">ลงทะเบียนผู้อนุมัติ</h2>
            <p class="text-center text-gray-500 text-sm mb-6">กรุณาระบุรหัสผ่านเพื่อสวมสิทธิ์การอนุมัติ</p>
            <div class="space-y-4">
                <input type="password" id="reg-pass" placeholder="รหัสผ่านผู้อนุมัติ" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                <button onclick="register()" 
                    class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition transform active:scale-95 shadow-md">
                    ลงทะเบียน
                </button>
            </div>
        </div>
    </div>

    <!-- 1. List Screen -->
    <div id="list-screen" class="hidden pb-32">
        <header class="bg-indigo-600 text-white p-4 sticky top-0 z-10 shadow-lg flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg">รายการรออนุมัติ</h1>
                <p id="user-info" class="text-xs opacity-80 italic"></p>
            </div>
            <button onclick="location.reload()" class="bg-indigo-500 p-2 rounded-full hover:bg-indigo-400">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </header>

        <div id="data-container" class="p-4 space-y-4 max-w-2xl mx-auto">
            <!-- Cards will be injected here -->
        </div>

        <div id="no-data" class="hidden text-center py-20">
            <div class="text-6xl mb-4">🎉</div>
            <h3 class="text-xl font-bold text-gray-500">ไม่มีรายการรออนุมัติแล้ว</h3>
        </div>

        <!-- Floating Action Bar -->
        <div id="action-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] flex gap-4 max-w-2xl mx-auto">
            <button onclick="processApprove('Rejected')" 
                class="flex-1 bg-white border-2 border-red-500 text-red-500 font-bold py-4 rounded-xl hover:bg-red-50 transition active:scale-95">
                ไม้อนุมัติ
            </button>
            <button onclick="processApprove('Approved')" 
                class="flex-1 bg-green-500 text-white font-bold py-4 rounded-xl hover:bg-green-600 transition shadow-lg active:scale-95">
                อนุมัติ
            </button>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx1TkL-05KU10tFUaGcpqfkh9TqNfHaZHIwMA75HkGNmUNncj8rw4JkrvIqS1ksRa16/exec"; // *** วาง Web App URL จาก GAS ที่นี่ ***
        let userProfile = {};
        let approveRequestName = "";

        async function init() {
            try {
                await liff.init({ liffId: "2009018471-gUZQupT4" }); // *** วาง LIFF ID ของคุณที่นี่ ***
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                userProfile = await liff.getProfile();
                checkAuthorization();
            } catch (err) {
                console.error("LIFF Init Error:", err);
            }
        }

        async function callApi(payload) {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                if (!res.success) throw new Error(res.message);
                return res.data;
            } catch (err) {
                alert("ข้อผิดพลาด: " + err.message);
                return null;
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        async function checkAuthorization() {
            const data = await callApi({ action: 'checkUser', line_uid: userProfile.userId });
            if (data && data.status === 'authorized') {
                approveRequestName = data.approve_request;
                showListScreen();
            } else {
                document.getElementById('reg-screen').classList.remove('hidden');
            }
        }

        async function register() {
            const pass = document.getElementById('reg-pass').value;
            if (!pass) return alert("กรุณากรอกรหัสผ่าน");
            
            const data = await callApi({ 
                action: 'register', 
                line_uid: userProfile.userId, 
                displayName: userProfile.displayName, 
                password: pass 
            });
            
            if (data) {
                approveRequestName = data.approve_request;
                showListScreen();
            }
        }

        async function showListScreen() {
            document.getElementById('reg-screen').classList.add('hidden');
            document.getElementById('list-screen').classList.remove('hidden');
            document.getElementById('user-info').innerText = `ผู้อนุมัติ: ${approveRequestName} (${userProfile.displayName})`;
            loadData();
        }

        async function loadData() {
            const items = await callApi({ action: 'getPending', approve_request: approveRequestName });
            const container = document.getElementById('data-container');
            container.innerHTML = "";
            
            if (!items || items.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
                document.getElementById('action-bar').classList.add('hidden');
                return;
            }

            document.getElementById('no-data').classList.add('hidden');
            document.getElementById('action-bar').classList.remove('hidden');

            items.forEach(item => {
                const imgUrl = item.pic.replace('/view?usp=drivesdk', '').replace('file/d/', 'uc?id=').split('?')[0];
                const card = `
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col">
                        <div class="p-4 bg-gray-50 border-b flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-indigo-900 leading-tight">${item.project || 'ไม่ระบุโครงการ'}</h3>
                                <p class="text-xs text-gray-500 mt-1">ผู้ขอ: ${item.reqName}</p>
                            </div>
                            <span class="text-indigo-600 font-bold">฿${parseFloat(item.net).toLocaleString()}</span>
                        </div>
                        <div class="p-4 flex gap-4">
                            <div class="w-24 h-24 flex-shrink-0 bg-gray-200 rounded-lg overflow-hidden cursor-pointer" onclick="window.open('${item.pic}', '_blank')">
                                <img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100?text=No+Image'">
                            </div>
                            <div class="flex-1 text-sm space-y-1">
                                <p><span class="text-gray-400">วันที่:</span> ${item.docDate}</p>
                                <p><span class="text-gray-400">รายละเอียด:</span> ${item.remark || '-'}</p>
                            </div>
                        </div>
                        <label class="p-4 bg-indigo-50/50 flex items-center justify-between cursor-pointer border-t">
                            <span class="text-sm font-medium text-indigo-700">เลือกรายการนี้</span>
                            <input type="checkbox" name="record" value="${item.recordId}" class="w-6 h-6 rounded text-indigo-600">
                        </label>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        async function processApprove(status) {
            const selected = Array.from(document.querySelectorAll('input[name="record"]:checked')).map(el => el.value);
            if (selected.length === 0) return alert("กรุณาเลือกอย่างน้อย 1 รายการ");

            const confirmText = status === 'Approved' ? 'ยืนยันการอนุมัติ?' : 'ยืนยันการไม้อนุมัติ?';
            if (!confirm(confirmText)) return;

            const success = await callApi({ 
                action: 'updateStatus', 
                items: selected, 
                line_uid: userProfile.userId, 
                status: status 
            });

            if (success) {
                loadData();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
